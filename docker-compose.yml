x-spark-common-env: &spark-common-env
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
  AWS_REGION: ${AWS_REGION}
  S3_ENDPOINT_URL: ${S3_ENDPOINT_URL_INTERNAL}
  SPARK_CONF_DIR: /opt/spark/conf
  PYSPARK_PYTHON: python3

x-spark-common-volumes: &spark-common-volumes
  - ./data:/opt/project/data
  - ./src:/opt/project/src
  - ./spark:/opt/project/spark
  - ./sql:/opt/project/sql
  - ./reports:/opt/project/reports
  - ./spark/configs:/opt/spark/conf:ro

x-airflow-common-env: &airflow-common-env
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
  AIRFLOW__CORE__DEFAULT_TIMEZONE: UTC
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
  AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY}
  AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
  AWS_DEFAULT_REGION: ${AWS_REGION}
  JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
  S3_ENDPOINT_URL: ${S3_ENDPOINT_URL_INTERNAL}
  SPARK_MASTER_URL: ${AIRFLOW_SPARK_MASTER_URL:-local[*]}
  PYTHONPATH: /opt/project

x-airflow-common-volumes: &airflow-common-volumes
  - ./airflow/dags:/opt/airflow/dags
  - ./src:/opt/project/src
  - ./spark:/opt/project/spark
  - ./scripts:/opt/project/scripts
  - ./sql:/opt/project/sql
  - ./data:/opt/project/data
  - ./reports:/opt/project/reports
  - airflow_logs:/opt/airflow/logs

services:
  postgres:
    image: postgres:16-alpine
    container_name: lakehouse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - lakehouse

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    container_name: lakehouse-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    networks:
      - lakehouse

  minio-init:
    image: minio/mc:RELEASE.2025-02-15T10-36-16Z
    container_name: lakehouse-minio-init
    depends_on:
      minio:
        condition: service_started
    entrypoint: /bin/sh
    command:
      - -c
      - >
        until mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}; do
          echo "Aguardando MinIO...";
          sleep 2;
        done &&
        mc mb --ignore-existing local/${LAKEHOUSE_BUCKET}
    restart: "no"
    networks:
      - lakehouse

  spark-master:
    image: spark:3.5.2-java17-python3
    container_name: lakehouse-spark-master
    restart: unless-stopped
    depends_on:
      minio-init:
        condition: service_completed_successfully
    ports:
      - "${SPARK_MASTER_PORT:-7077}:7077"
      - "${SPARK_MASTER_UI_PORT:-18080}:8080"
    environment:
      <<: *spark-common-env
    volumes: *spark-common-volumes
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master
      - --host
      - spark-master
      - --port
      - "7077"
      - --webui-port
      - "8080"
    networks:
      - lakehouse

  spark-worker:
    image: spark:3.5.2-java17-python3
    container_name: lakehouse-spark-worker
    restart: unless-stopped
    depends_on:
      spark-master:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    environment:
      <<: *spark-common-env
    ports:
      - "${SPARK_WORKER_UI_PORT:-18081}:8081"
    volumes: *spark-common-volumes
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - --host
      - spark-worker
      - --cores
      - "${SPARK_WORKER_CORES}"
      - --memory
      - "${SPARK_WORKER_MEMORY}"
      - --webui-port
      - "8081"
      - spark://spark-master:7077
    networks:
      - lakehouse

  airflow-init:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    image: aws-lakehouse-engineering-lab-airflow:local
    container_name: lakehouse-airflow-init
    hostname: airflow-init
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment: *airflow-common-env
    user: "${AIRFLOW_UID}:${AIRFLOW_GID}"
    volumes: *airflow-common-volumes
    entrypoint: /bin/bash
    command:
      - -c
      - >
        airflow db migrate &&
        airflow users create --role Admin --username ${AIRFLOW_ADMIN_USERNAME} --password ${AIRFLOW_ADMIN_PASSWORD} --firstname ${AIRFLOW_ADMIN_FIRSTNAME} --lastname ${AIRFLOW_ADMIN_LASTNAME} --email ${AIRFLOW_ADMIN_EMAIL} || true
    restart: "no"
    networks:
      - lakehouse

  airflow-webserver:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    image: aws-lakehouse-engineering-lab-airflow:local
    container_name: lakehouse-airflow-webserver
    hostname: airflow-webserver
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      spark-master:
        condition: service_started
    environment: *airflow-common-env
    user: "${AIRFLOW_UID}:${AIRFLOW_GID}"
    volumes: *airflow-common-volumes
    command: webserver
    ports:
      - "${AIRFLOW_WEBSERVER_PORT:-8088}:8080"
    networks:
      - lakehouse

  airflow-scheduler:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    image: aws-lakehouse-engineering-lab-airflow:local
    container_name: lakehouse-airflow-scheduler
    hostname: airflow-scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      spark-master:
        condition: service_started
    environment: *airflow-common-env
    user: "${AIRFLOW_UID}:${AIRFLOW_GID}"
    volumes: *airflow-common-volumes
    command: scheduler
    networks:
      - lakehouse

volumes:
  postgres_data:
  minio_data:
  airflow_logs:

networks:
  lakehouse:
    name: ${COMPOSE_PROJECT_NAME:-aws-lakehouse-engineering-lab}_network
