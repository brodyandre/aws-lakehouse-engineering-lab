name: ${COMPOSE_PROJECT_NAME:-aws-lakehouse-engineering-lab}

x-spark-common-env: &spark-common-env
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
  AWS_REGION: ${AWS_REGION}
  S3_ENDPOINT_URL: ${S3_ENDPOINT_URL_INTERNAL}
  SPARK_CONF_DIR: /opt/spark/conf
  PYSPARK_PYTHON: python3

x-spark-common-volumes: &spark-common-volumes
  - ./data:/opt/project/data
  - ./src:/opt/project/src
  - ./spark:/opt/project/spark
  - ./sql:/opt/project/sql
  - ./reports:/opt/project/reports
  - ./scripts:/opt/project/scripts
  - ./spark/configs:/opt/spark/conf:ro

x-airflow-common-env: &airflow-common-env
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
  AIRFLOW__CORE__DEFAULT_TIMEZONE: UTC
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
  AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
  AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-api-execution:8081/execution/
  AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_API_JWT_SECRET:-change-me-airflow-jwt}
  AIRFLOW__API_AUTH__JWT_ISSUER: ${AIRFLOW_API_JWT_ISSUER:-airflow}
  AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
  AWS_DEFAULT_REGION: ${AWS_REGION}
  JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
  S3_ENDPOINT_URL: ${S3_ENDPOINT_URL_INTERNAL}
  SPARK_MASTER_URL: ${AIRFLOW_SPARK_MASTER_URL:-spark://spark-master:7077}
  SPARK_REMOTE: ${AIRFLOW_SPARK_REMOTE:-}
  PYTHONPATH: /opt/project

x-airflow-common-volumes: &airflow-common-volumes
  - ./airflow/dags:/opt/airflow/dags
  - ./src:/opt/project/src
  - ./spark:/opt/project/spark
  - ./scripts:/opt/project/scripts
  - ./sql:/opt/project/sql
  - ./data:/opt/project/data
  - ./reports:/opt/project/reports
  - airflow_logs:/opt/airflow/logs

services:
  postgres:
    image: postgres:16-alpine
    container_name: lakehouse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - lakehouse

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    container_name: lakehouse-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    networks:
      - lakehouse

  minio-init:
    image: minio/mc:RELEASE.2025-02-15T10-36-16Z
    container_name: lakehouse-minio-init
    depends_on:
      minio:
        condition: service_started
    entrypoint: /bin/sh
    command:
      - -c
      - >
        until mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}; do
          echo "Aguardando storage S3-compatible...";
          sleep 2;
        done &&
        mc mb --ignore-existing local/${LAKEHOUSE_BUCKET} &&
        mc mb --ignore-existing local/${MINIO_RAW_BUCKET} &&
        mc mb --ignore-existing local/${MINIO_BRONZE_BUCKET} &&
        mc mb --ignore-existing local/${MINIO_SILVER_BUCKET} &&
        mc mb --ignore-existing local/${MINIO_GOLD_BUCKET}
    restart: "no"
    networks:
      - lakehouse

  spark-master:
    image: spark:3.5.2-java17-python3
    container_name: lakehouse-spark-master
    restart: unless-stopped
    depends_on:
      minio-init:
        condition: service_completed_successfully
    ports:
      - "${SPARK_MASTER_PORT:-7077}:7077"
      - "${SPARK_MASTER_UI_PORT:-18080}:8080"
    environment:
      <<: *spark-common-env
    volumes: *spark-common-volumes
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master
      - --host
      - spark-master
      - --port
      - "7077"
      - --webui-port
      - "8080"
    networks:
      - lakehouse

  spark-worker:
    image: spark:3.5.2-java17-python3
    container_name: lakehouse-spark-worker
    restart: unless-stopped
    depends_on:
      spark-master:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    environment:
      <<: *spark-common-env
    ports:
      - "${SPARK_WORKER_UI_PORT:-18081}:8081"
    volumes: *spark-common-volumes
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - --host
      - spark-worker
      - --cores
      - "${SPARK_WORKER_CORES}"
      - --memory
      - "${SPARK_WORKER_MEMORY}"
      - --webui-port
      - "8081"
      - spark://spark-master:7077
    networks:
      - lakehouse

  spark-connect:
    image: spark:3.5.2-java17-python3
    container_name: lakehouse-spark-connect
    restart: unless-stopped
    depends_on:
      spark-master:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    environment:
      <<: *spark-common-env
    ports:
      - "${SPARK_CONNECT_PORT:-15002}:15002"
    volumes: *spark-common-volumes
    command:
      - /bin/bash
      - -lc
      - >
        mkdir -p /tmp/.ivy2/cache &&
        export HOME=/tmp &&
        /opt/spark/sbin/start-connect-server.sh
        --packages org.apache.spark:spark-connect_2.12:3.5.2
        --master spark://spark-master:7077
        --conf spark.connect.grpc.binding.address=0.0.0.0
        --conf spark.connect.grpc.binding.port=15002
        --conf spark.jars.ivy=/tmp/.ivy2
        --conf spark.hadoop.fs.s3a.endpoint=${S3_ENDPOINT_URL_INTERNAL}
        --conf spark.hadoop.fs.s3a.access.key=${AWS_ACCESS_KEY_ID}
        --conf spark.hadoop.fs.s3a.secret.key=${AWS_SECRET_ACCESS_KEY}
        --conf spark.hadoop.fs.s3a.path.style.access=true &&
        sleep infinity
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; socket.create_connection(('127.0.0.1', 15002), 2).close()"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - lakehouse

  airflow-init:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    image: aws-lakehouse-engineering-lab-airflow:local
    container_name: lakehouse-airflow-init
    hostname: airflow-init
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      spark-connect:
        condition: service_healthy
    environment: *airflow-common-env
    user: "${AIRFLOW_UID}:${AIRFLOW_GID}"
    volumes: *airflow-common-volumes
    command:
      - bash
      - -c
      - >
        airflow db migrate &&
        airflow users create --role Admin --username ${AIRFLOW_ADMIN_USERNAME} --password ${AIRFLOW_ADMIN_PASSWORD} --firstname ${AIRFLOW_ADMIN_FIRSTNAME} --lastname ${AIRFLOW_ADMIN_LASTNAME} --email ${AIRFLOW_ADMIN_EMAIL} || true
    restart: "no"
    networks:
      - lakehouse

  airflow-api-core:
    image: aws-lakehouse-engineering-lab-airflow:local
    container_name: lakehouse-airflow-api-core
    hostname: airflow-api-core
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment: *airflow-common-env
    user: "${AIRFLOW_UID}:${AIRFLOW_GID}"
    volumes: *airflow-common-volumes
    command: ["api-server", "--apps", "core", "--port", "8080"]
    ports:
      - "${AIRFLOW_API_PORT:-8088}:8080"
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; socket.create_connection(('127.0.0.1', 8080), 2).close()"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - lakehouse

  airflow-api-execution:
    image: aws-lakehouse-engineering-lab-airflow:local
    container_name: lakehouse-airflow-api-execution
    hostname: airflow-api-execution
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment: *airflow-common-env
    user: "${AIRFLOW_UID}:${AIRFLOW_GID}"
    volumes: *airflow-common-volumes
    command: ["api-server", "--apps", "execution", "--port", "8081"]
    ports:
      - "${AIRFLOW_EXECUTION_API_PORT:-8089}:8081"
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; socket.create_connection(('127.0.0.1', 8081), 2).close()"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - lakehouse

  airflow-scheduler:
    image: aws-lakehouse-engineering-lab-airflow:local
    container_name: lakehouse-airflow-scheduler
    hostname: airflow-scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      airflow-api-execution:
        condition: service_healthy
      spark-connect:
        condition: service_healthy
    environment: *airflow-common-env
    user: "${AIRFLOW_UID}:${AIRFLOW_GID}"
    volumes: *airflow-common-volumes
    command: ["scheduler"]
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; socket.create_connection(('127.0.0.1', 8974), 2).close()"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - lakehouse

  airflow-dag-processor:
    image: aws-lakehouse-engineering-lab-airflow:local
    container_name: lakehouse-airflow-dag-processor
    hostname: airflow-dag-processor
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      airflow-api-execution:
        condition: service_healthy
    environment: *airflow-common-env
    user: "${AIRFLOW_UID}:${AIRFLOW_GID}"
    volumes: *airflow-common-volumes
    command: ["dag-processor"]
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type DagProcessorJob --hostname \"$${HOSTNAME}\""]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - lakehouse

  airflow-triggerer:
    image: aws-lakehouse-engineering-lab-airflow:local
    container_name: lakehouse-airflow-triggerer
    hostname: airflow-triggerer
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      airflow-api-execution:
        condition: service_healthy
    environment: *airflow-common-env
    user: "${AIRFLOW_UID}:${AIRFLOW_GID}"
    volumes: *airflow-common-volumes
    command: ["triggerer"]
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type TriggererJob --hostname \"$${HOSTNAME}\""]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - lakehouse

  trino:
    image: trinodb/trino:481
    container_name: lakehouse-trino
    restart: unless-stopped
    ports:
      - "${TRINO_PORT:-8085}:8080"
    volumes:
      - ./trino/etc:/etc/trino:ro
      - ./data/serving:/opt/trino/lakehouse
    networks:
      - lakehouse

volumes:
  postgres_data:
  minio_data:
  airflow_logs:

networks:
  lakehouse:
    name: ${COMPOSE_PROJECT_NAME:-aws-lakehouse-engineering-lab}_network
