name: validate-yaml

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate-yaml:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install YAML validation tools
        run: |
          python -m pip install --upgrade pip
          pip install yamllint

      - name: Lint YAML files
        run: |
          yamllint docker-compose.yml compose .github/workflows

      - name: Validate docker compose configurations
        run: docker compose --env-file .env.example -f docker-compose.yml config -q
      - run: docker compose --env-file .env.example -f compose/storage.yml config -q
      - run: docker compose --env-file .env.example -f compose/spark.yml config -q
      - run: docker compose --env-file .env.example -f compose/airflow.yml config -q
      - run: docker compose --env-file .env.example -f compose/query.yml config -q
      - run: docker compose --env-file .env.example -f docker-compose.yml -f compose/aistor.yml config -q

      - name: Validate GitHub Actions workflows
        uses: devops-actions/actionlint@v0.1.12
