name: validate-python

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate-python:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONPATH: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Ruff
        run: python -m ruff check airflow scripts spark src tests

      - name: Run Black in check mode
        run: |
          python -m black --check airflow
          python -m black --check scripts
          python -m black --check spark
          python -m black --check src
          python -m black --check tests/unit
          python -m black --check tests/integration
          python -m black --check tests/data_quality

      - name: Run unit tests with pytest
        run: python -m pytest -q tests/unit
